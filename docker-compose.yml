version: "3.8"

services:
  mongodb:
    image: mongo:latest
    container_name: meetonmemory-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: meetonmemory-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: meetonmemory-server
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - MONGODB_URI=mongodb://mongodb:27017
      - REDIS_URI=redis://redis:6379
      - CLIENT_URL=http://localhost:5173
      - NODE_ENV=development
      # Add other necessary env vars below (JWT_SECRET, SMTP_USER, etc.) or use an env_file
    env_file:
      - ./server/.env
    volumes:
      - ./server:/app
      - /app/node_modules
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: meetonmemory-client
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:4000
    env_file:
      - ./client/.env
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - server
    restart: unless-stopped

volumes:
  mongodb_data:
  redis_data:
