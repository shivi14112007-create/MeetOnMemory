name: Claim Expiration Monitor

on:
  schedule:
    - cron: '0 * * * *'

permissions:
  issues: write

jobs:
  check_claims:
    runs-on: ubuntu-latest
    steps:
      - name: Scan and Expire Stale Claims
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // 1. Paginate to fetch ALL open issues seamlessly
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              per_page: 100
            });

            const BOT_MESSAGES = {
              reminder: (user) =>
                `⏰ @${user}, your claim has been inactive for 24 hours. Please provide an update within the next 24 hours, otherwise your claim will expire.`,

              expired: () =>
                `❌ This claim has expired after 48 hours of inactivity. The issue is now available for anyone to claim.`
            };
            for (const issue of issues) {
              if (!issue.assignees || issue.assignees.length === 0 || issue.pull_request) continue;
              
              // 2. Fetch all timeline events to ensure we evaluate the absolute newest activity
              const timeline = await github.paginate(github.rest.issues.listEventsForTimeline, {
                owner,
                repo,
                issue_number: issue.number,
                per_page: 100
              });

              if (timeline.length === 0) continue;
              
              // Get the newest event chronologically
              const lastEvent = timeline[timeline.length - 1];
              const lastActivityDate = new Date(lastEvent.created_at || issue.updated_at);
              const hoursInactive = (new Date() - lastActivityDate) / (1000 * 60 * 60);

              const currentAssignee = issue.assignees[0].login;

              if (hoursInactive >= 48) {
                // Remove assignee due to expiration
                await github.rest.issues.removeAssignees({
                  owner,
                  repo,
                  issue_number: issue.number,
                  assignees: [currentAssignee]
                });

                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issue.number,
                  body: BOT_MESSAGES.expired()
                });
              } else if (hoursInactive >= 24) {
                // Fetch comments to verify if we already posted the exact reminder
                const comments = await github.rest.issues.listComments({
                  owner,
                  repo,
                  issue_number: issue.number
                });

                // 3. Match text verification cleanly to prevent hourly duplication
                const alreadyWarned = comments.data.some(
                   c => c.body.includes("your claim has been inactive for 24 hours")
                
);
                if (!alreadyWarned) {
                  await github.rest.issues.createComment({
                    owner,
                    repo,
                    issue_number: issue.number,
                    body: BOT_MESSAGES.reminder(currentAssignee)
                  });
                }
              }
            }