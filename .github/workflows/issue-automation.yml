name: Open Source Contributor Workflow

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [closed]

permissions:
  issues: write
  pull-requests: write

jobs:
  handle_automation:
    runs-on: ubuntu-latest
    steps:
      - name: Process Automation Rules
        uses: actions/github-script@v7
        with:
          script: |
            // ========================================================
            // 1. HANDLE PR MERGE THANK YOU COMMENT (Feature 6)
            // ========================================================
            if (context.eventName === 'pull_request_target') {
              const pr = context.payload.pull_request;
              if (pr.merged) {
                const prAuthor = pr.user.login;
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  body: `🎉 Thank you for your contribution! Your pull request has been successfully merged. We appreciate your effort in improving MeetOnMemory, @${prAuthor}!`
                });
              }
              return;
            }

            // ========================================================
            // 2. HANDLE ISSUE COMMANDS (Features 2, 3, 4)
            // ========================================================
            if (context.eventName === 'issue_comment' && !context.payload.issue.pull_request) {
              const commentBody = context.payload.comment.body.trim();
              const commenter = context.payload.comment.user.login;
              const issueNumber = context.issue.number;

              // Fallback variables using payload data in case the real-time API call fails
              let issueState = context.payload.issue.state;
              let assignees = context.payload.issue.assignees || [];
              let issueAuthor = context.payload.issue.user.login;
              let authorAssociation = context.payload.issue.author_association;

              // Fetch freshest issue state via API to eliminate race conditions
              try {
                const { data: freshIssue } = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber
                });
                issueState = freshIssue.state;
                assignees = freshIssue.assignees || [];
                issueAuthor = freshIssue.user.login;
                authorAssociation = freshIssue.author_association;
              } catch (error) {
                console.warn(`⚠️ Warning: Failed to fetch fresh issue state from API for #${issueNumber}. Falling back to payload data. Error: ${error.message}`);
              }

              const isAssigned = assignees.length > 0;
              const isIssueAuthor = commenter === issueAuthor;

              const isMaintainerIssue = [
                "OWNER",
                "MEMBER",
                "COLLABORATOR"
              ].includes(authorAssociation);
              const CLAIM_COMMAND = "/claim";
              const UNCLAIM_COMMAND = "/unclaim";

              const BOT_MESSAGES = {
                invalidClaim: (user) => 
                  `👋 Thanks for your interest, @${user}!\n\n` +
                  `To claim this issue, please comment:\n\n` +
                  `\`${CLAIM_COMMAND}\`\n\n` +
                  `Only the first valid \`${CLAIM_COMMAND}\` comment is eligible for automatic assignment.`,

                assigned: (user) => 
                  `🎉 Issue Assigned\n\n` +
                  `Welcome @${user}!\n\n` +
                  `This issue has been assigned to you following our first-come, first-served policy.\n\n` +
                  `Please submit a Pull Request within 24 hours.\n\n` +
                  `If you need more time, please update the issue before the deadline.\n\n` +
                  `Happy coding! 🚀`,

                alreadyAssigned: (user) => 
                  `❌ Issue Already Assigned\n\n` +
                  `This issue is currently assigned to @${user}.\n\n` +
                  `Please explore other available unassigned issues while waiting for this issue to become available.\n\n` +
                  `If the current assignee becomes inactive, the issue may be automatically reopened according to the repository's assignment policy.\n\n` +
                  `Thank you for your interest in contributing! 💙`,

                claimRejected: (author) => 
                  `❌ This issue was opened by another contributor.\n\n` +
                  `Only the issue author (@${author}) may claim this issue automatically.\n\n` +
                  `Repository maintainers may still assign contributors manually if required.`,
                
                alreadyClaimed: (user) => `⚠️ @${user}, you are already assigned to this issue!`,
                
                closedIssue: (user) => `❌ Request denied. You cannot claim a closed issue, @${user}.`,
                
                limitReached: (user, issuesList) => {
                  let listStr = "";
                  if (issuesList && issuesList.length > 0) {
                    listStr = "\n\n**Your currently assigned issues:**\n" +
                      issuesList.map(i => `- #${i.number} ${i.title}`).join("\n");
                  }
                  return `❌ Assignment Limit Reached\n\n` +
                    `Hi @${user},\n\n` +
                    `You currently have 4 active assigned issues, which is the maximum allowed.${listStr}\n\n` +
                    `Please complete, merge, or /unclaim one of your existing issues before claiming another.\n\n` +
                    `This policy helps ensure fair participation and prevents issue hoarding.\n\n` +
                    `Thank you for contributing to MeetOnMemory! 🚀`;
                }
              };

              const invalidClaimMessages = [
                "can i work on this?",
                "please assign me",
                "interested",
                "i would like to contribute.",
                "i would like to contribute"
              ];

              const isClaimCommand = commentBody === CLAIM_COMMAND;
              const isInvalidClaim = invalidClaimMessages.includes(commentBody.toLowerCase());
              const isAssignmentRequest = isClaimCommand || isInvalidClaim;

              if (isAssignmentRequest && isAssigned && commenter !== assignees[0].login) {
                const currentAssignee = assignees[0].login;
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  body: BOT_MESSAGES.alreadyAssigned(currentAssignee)
                });
                return;
              }

              if (
                commentBody !== CLAIM_COMMAND &&
                commentBody !== UNCLAIM_COMMAND &&
                invalidClaimMessages.includes(commentBody.toLowerCase())
              ) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  body: BOT_MESSAGES.invalidClaim(commenter)
                });
                return;
              }

              // --- SUB-FEATURE: /claim ---
              if (commentBody === CLAIM_COMMAND) {
                // Reject claim if the issue is already closed
                if (issueState === 'closed') {
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNumber,
                    body: BOT_MESSAGES.closedIssue(commenter)
                  });
                  return;
                }
                if (isAssigned) {
                  const currentAssignee = assignees[0].login;
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNumber,
                    body: currentAssignee === commenter
                      ? BOT_MESSAGES.alreadyClaimed(commenter)
                      : BOT_MESSAGES.alreadyAssigned(currentAssignee)
                  });
                  return;
                }

                // Count active assigned issues before claiming
                const assignedIssues = await github.paginate(github.rest.issues.listForRepo, {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  state: 'open',
                  assignee: commenter,
                  per_page: 100
                });
                const activeIssues = assignedIssues.filter(i => !i.pull_request);
                if (activeIssues.length >= 4) {
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNumber,
                    body: BOT_MESSAGES.limitReached(commenter, activeIssues)
                  });
                  return;
                }

                if (!isMaintainerIssue && !isIssueAuthor) {
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNumber,
                    body: BOT_MESSAGES.claimRejected(issueAuthor)
                  });
                  return;
                }

                await github.rest.issues.addAssignees({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  assignees: [commenter]
                });

                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  body: BOT_MESSAGES.assigned(commenter)
                });
              }

              // --- SUB-FEATURE: /unclaim ---
              if (commentBody === UNCLAIM_COMMAND) {
                if (!isAssigned) {
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNumber,
                    body: `⚠️ There is no active claim on this issue to release.`
                  });
                  return;
                }

                const currentAssignee = assignees[0].login;

                // Call real GitHub API to resolve official repo access levels
                let hasMaintainerRights = false;
                try {
                  const permCheck = await github.rest.repos.getCollaboratorPermissionLevel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    username: commenter
                  });
                  const role = permCheck.data.permission;
                  hasMaintainerRights = role === 'admin' || role === 'write';
                } catch (e) {
                  hasMaintainerRights = context.repo.owner === commenter;
                }

                if (currentAssignee !== commenter && !hasMaintainerRights) {
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNumber,
                    body: `❌ Only the assigned developer (@${currentAssignee}) or a repository maintainer can unclaim this.`
                  });
                  return;
                }

                await github.rest.issues.removeAssignees({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  assignees: [currentAssignee]
                });

                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  body: `🔓 @${currentAssignee} has released this issue. It is now available for anyone to claim.`
                });
              }
            }
