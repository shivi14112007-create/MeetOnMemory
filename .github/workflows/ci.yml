name: CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify Code Formatting
        run: |
          git fetch origin ${{ github.base_ref || 'main' }} --depth=1
          TARGET_BRANCH="origin/${{ github.base_ref || 'main' }}"
          CHANGED_FILES=$(git diff --name-only $TARGET_BRANCH...HEAD | grep -E '\.(js|jsx|ts|tsx|css|html|json|md|yml|yaml)$' || true)
          if [ -n "$CHANGED_FILES" ]; then
            npx prettier --check $CHANGED_FILES
          else
            echo "No changed files to check."
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: npm ci --prefix client

      - name: Run Lint checks
        run: npm run lint

  prettier:
    name: Prettier Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify Prettier Check
        run: |
          git fetch origin ${{ github.base_ref || 'main' }} --depth=1
          TARGET_BRANCH="origin/${{ github.base_ref || 'main' }}"
          CHANGED_FILES=$(git diff --name-only $TARGET_BRANCH...HEAD | grep -E '\.(js|jsx|ts|tsx|css|html|json|md|yml|yaml)$' || true)
          if [ -n "$CHANGED_FILES" ]; then
            npx prettier --check $CHANGED_FILES
          else
            echo "No changed files to check."
          fi

  build:
    name: Production Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: npm ci --prefix client

      - name: Verify Production Build
        run: npm run build
